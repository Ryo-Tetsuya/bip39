name: release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact_path: target/x86_64-pc-windows-msvc/release/bip39.exe
            artifact_name: bip39-tool-windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_path: target/x86_64-unknown-linux-gnu/release/bip39
            artifact_name: bip39-tool-linux-bin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_path: target/aarch64-apple-darwin/release/bip39
            artifact_name: bip39-tool-macos-bin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          target: ${{ matrix.target }}

      - name: Install Linux GUI Build Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Cache Cargo Registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Formatting
        run: bash scripts/cargo-sanitized.sh fmt --check

      - name: Run Clippy
        run: bash scripts/cargo-sanitized.sh clippy --locked --all-targets -- -D warnings

      - name: Build Binary
        run: bash scripts/cargo-sanitized.sh build --release --locked --target ${{ matrix.target }}

      - name: Run Tests
        run: bash scripts/cargo-sanitized.sh test --locked --verbose

      - name: Package Linux AppDir
        if: runner.os == 'Linux'
        run: |
          bash scripts/package-linux.sh "${{ matrix.artifact_path }}" "BIP39 Tool.AppDir"
          tar -czf bip39-tool-linux.tar.gz "BIP39 Tool.AppDir"

      - name: Package macOS App
        if: runner.os == 'macOS'
        run: |
          bash scripts/package-macos.sh "${{ matrix.artifact_path }}" "BIP39 Tool.app"
          ditto -c -k --sequesterRsrc --keepParent "BIP39 Tool.app" bip39-tool-macos.zip

      - name: Check Binary Path Leaks
        if: runner.os != 'Windows'
        run: |
          bash scripts/check-binary-paths.sh "${{ matrix.artifact_path }}"

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn
          compression-level: 6
          overwrite: true

      - name: Upload Linux AppDir Artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: bip39-tool-linux
          path: bip39-tool-linux.tar.gz
          if-no-files-found: error
          compression-level: 6
          overwrite: true

      - name: Upload macOS App Artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: bip39-tool-macos
          path: bip39-tool-macos.zip
          if-no-files-found: error
          compression-level: 6
          overwrite: true

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache Cargo Registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run Dependency Audit
        run: cargo audit
